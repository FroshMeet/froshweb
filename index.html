<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Gen Z Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Force title and favicon update immediately -->
    <script>
      document.title = "FroshMeet - Meet Your College Crew Before Day One";
      // Force favicon update with timestamp
      const links = document.querySelectorAll("link[rel*='icon']");
      links.forEach(link => link.remove());

      const timestamp = Date.now();
      const newFavicon = document.createElement('link');
      newFavicon.rel = 'icon';
      newFavicon.type = 'image/png';
      newFavicon.href = '/lovable-uploads/a880e910-33fe-4ce7-b556-01f73d623057.png?cache=' + timestamp;
      document.head.appendChild(newFavicon);

      // Force page refresh for cache bypass
      if (!sessionStorage.getItem('faviconUpdated')) {
        sessionStorage.setItem('faviconUpdated', 'true');
        setTimeout(() => window.location.reload(true), 100);
      }
    </script>

    <!-- ✅ Custom FroshMeet favicon -->
