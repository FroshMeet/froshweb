<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Gen Z Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Force title and favicon update immediately -->
    <script>
      document.title = "FroshMeet";
      // Force favicon update with timestamp
      const links = document.querySelectorAll("link[rel*='icon']");
      links.forEach(link => link.remove());

      const timestamp = Date.now();
      const newFavicon = document.createElement('link');
      newFavicon.rel = 'icon';
      newFavicon.type = 'image/png';
      newFavicon.href = '/favicon.png?cache=' + timestamp; // ✅ LOCAL favicon
      document.head.appendChild(newFavicon);

      // Force page refresh for cache bypass
      if (!sessionStorage.getItem('faviconUpdated')) {
        sessionStorage.setItem('faviconUpdated', 'true');
        setTimeout(() => window.location.reload(true), 100);
      }
    </script>

    <!-- ✅ These stay for compatibility but point to local favicon -->
    <link rel="icon" href="/favicon.png?cache=20250703001" type="image/png">
    <link rel="shortcut icon" href="/favicon.png?cache=20250703001" type="image/png">
    <link rel="apple-touch-icon" href="/favicon.png?cache=20250703001">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?cache=20250703001">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png?cache=20250703001">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Aggressive cache control -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta http-equiv="Last-Modified" content="0" />

    <title>FroshMeet</title>
    <meta name="description" content="Connect with fellow freshmen and find your perfect roommate" />
    <meta name="author" content="FroshMeet" />

    <meta property="og:title" content="FroshMeet" />
    <meta property="og:description" content="Connect with fellow freshmen and find your perfect roommate" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lovable_dev" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
